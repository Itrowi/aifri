<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Health Explainer Agent</title>
    <link rel="stylesheet" href="/static/style.css">
  </head>
  <body>
    <div class="container">
      <h1>Health Explainer Agent</h1>
      <p>Enter a health topic and the agent will fetch PubMed abstracts and explain them in simple language.</p>
      <form action="/explain" method="post">
        <input name="topic" placeholder="e.g. type 2 diabetes" required>
        <button type="submit">Explain</button>
      </form>
      <p class="note">Note: This is educational only and not medical advice.</p>
    </div>
  </body>
</html>
